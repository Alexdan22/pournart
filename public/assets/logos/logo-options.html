<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pour n Art Logo Options</title>
    <style>
      :root {
        color: #10191c;
        background: #fff8ee;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      h1 {
        margin: 0 0 22px;
        font-size: 26px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 22px;
      }

      figure {
        margin: 0;
        border: 1px solid #d5c3ac;
        border-radius: 10px;
        background: white;
        box-shadow: 0 18px 44px rgba(16, 25, 28, 0.12);
        overflow: hidden;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      figcaption {
        padding: 12px 14px;
        color: #526166;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Pour n Art Logo Concepts</h1>
    <div class="grid">
      <figure>
        <img src="./pour-n-art-logo-01-heart-pour.svg" alt="Heart pour logo concept" />
        <figcaption>01 Heart Pour - clear pour + heart story</figcaption>
      </figure>
      <figure>
        <img src="./pour-n-art-logo-02-boutique-seal.svg" alt="Boutique seal logo concept" />
        <figcaption>02 Boutique Seal - premium and gift-focused</figcaption>
      </figure>
      <figure>
        <img src="./pour-n-art-logo-03-wordmark-wave.svg" alt="Wave wordmark logo concept" />
        <figcaption>03 Wordmark Wave - elegant horizontal website logo</figcaption>
      </figure>
      <figure>
        <img src="./pour-n-art-logo-04-social-mark.svg" alt="Social mark logo concept" />
        <figcaption>04 Social Mark - compact icon/avatar direction</figcaption>
      </figure>
    </div>
  </body>
</html>
