<svg width="720" height="260" viewBox="0 0 720 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pour n Art social mark logo concept</title>
  <desc id="desc">A compact monogram-style logo for social profiles and website icons, emphasizing the pour and heart idea.</desc>
