services:
  - type: web
    name: pour-n-art
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /
    disk:
      name: pour-n-art-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/pour-n-art.db
      - key: SESSION_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: EMAIL_APP_URL
        value: "https://pournart.in"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CAPTURE_ON_VERIFY
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_STUDIO
        value: "Pour n Art Studio <studio@pournart.in>"
      - key: EMAIL_ORDERS
        value: "Pour n Art Orders <orders@pournart.in>"
      - key: EMAIL_SUPPORT
        value: "Pour n Art Support <support@pournart.in>"
      - key: EMAIL_CONTACT
        value: "Pour n Art <contact@pournart.in>"
      - key: EMAIL_ADMIN
        sync: false
      - key: EMAIL_QUEUE_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        sync: false
      - key: AURORA_PILOT_ENABLED
        value: "false"
      - key: AURORA_PILOT_ADMIN_ALLOWLIST
        sync: false
